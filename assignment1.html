<!DOCTYPE html>
    <head>
        <title>Form</title>
        <style>
            table {
            border-collapse: collapse;
            width: 60%;
            margin-top: 20px;
            }
            th, td {
                border: 1px solid black;
                padding: 8px;
            }
            th {
                background-color: #f2f2f2;
            }
            form {
                margin-bottom: 20px;
            }
        </style>
    </head>
    <body>
        <h2>Student Registration</h2>
        <form id="studentForm">
            <!-- <input type="hidden" id="studentId"> -->
            <label>Name:</label>
            <input type="text" name="n1" required><br><br>
            <label>Qualification:</label>
            <input type="radio" name="q1" value="BCA">BCA
            <input type="radio" name="q1" value="MCA">MCA<br><br>
            <label>Hobbies:</label>
            <input type="checkbox" name="h1" value="Reading">Reading
            <input type="checkbox" name="h1" value="Writting">Writting<br><br>
            <label>Country:</label>
            <select id="co" name="c1">
                <option>India</option>
                <option>Australia</option>
                <option>China</option>
            </select><br><br>
            <button type="submit">Submit</button>
        </form>
        <h3>All Students</h3>
        <div id="students">Loading...</div>
        <script>
            let editId = null;

            // Fetch and display students
        function loadStudents() {
            fetch('/student1')
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        document.getElementById('students').innerHTML = 'No students found.';
                        return;
                    }

                    let html = '<table><tr><th>ID</th><th>Name</th><th>Qualification</th><th>Hobbies</th><th>Country</th><th>Delete</th><th>Edit</th></tr>';
                    data.forEach(student => {
                        html += `
                            <tr>
                                <td>${student.id}</td>
                                <td>${student.name}</td>
                                <td>${student.qualification}</td>
                                <td>${student.hobbies}</td>
                                <td>${student.country}</td>
                                <td align="center"><button onClick="deleteStudent(${student.id})">Delete</button></td>
                                <td align="center"><button onClick="fillForm(${student.id},'${student.name}','${student.qualification},'${student.hobbies}','${student.country}')">Edit</button></td>
                            </tr>`;
                    });
                
                    html += '</table>';
                    document.getElementById('students').innerHTML = html;
                })
                .catch(() => {
                    document.getElementById('students').innerHTML = 'Failed to load students.';
                });
        }

            // Form submission
            document.getElementById('studentForm').addEventListener('submit',function(e){
                e.preventDefault();
                const name = document.querySelector('[name = "n1"]').value;
                // Get selected qualification (radio)
                const qualification = document.querySelector('[name="q1"]:checked')?.value || '';
                // Get selected hobbies (checkbox)
                const hobbiesArray = Array.from(document.querySelectorAll('[name="h1"]:checked')).map(cb => cb.value);
                const hobbies = hobbiesArray.join(',');
                const country = document.querySelector('[name = "c1"]').value;
                
                // if (!name || !qualification || !hobbies || !country) {
                //     return res.status(400).send('All fields are required');
                // }

                if (!qualification) {
                    alert("Please select a qualification.");
                    return;
                }

                // Optional: ensure at least one hobby selected
                if (hobbiesArray.length === 0) {
                    alert("Please select at least one hobby.");
                    return;
                }

                if (!country) {
                    alert("Please select a country.");
                    return;
                }
                //update
                    if(editId){
                        fetch('/updateStudent/${editId}', {
                            method:'PUT',
                            headers:{'Content-Type': 'application/json'},
                            body:JSON.stringify({name,qualification,hobbies,country})
                        })
                        .then(res => res.text())
                        .then(msg => {
                            alert(msg);
                            resetForm();
                            loadStudents();
                        });
                    }
                    else
                    {

                //Add
                fetch('/submit-student-data',{
                    method: 'POST',
                    headers: {'Content-type': 'application/json'},
                    body: JSON.stringify({name,qualification,hobbies,country})
                })
                .then(res => res.text())
                .then(msg => {
                    alert(msg);
                    resetForm();
                    // loadStudents();
                })
                .catch(() => {
                    alert('Failed to submit student data');
                });
            }
            });
            // Fill Form for editing
                function fillForm(id,name,qualification,hobbies,country){
                    editId = id;
                    document.querySelector('[name="n1"]').value = name;
                    // Set qualification (radio)
                    document.querySelectorAll('[name="q1"]').forEach(r => {
                        r.checked = (r.value === qualification);
                    });
                    // Set hobbies (checkbox)
                    const hobbiesArray = hobbies.split(',');
                    document.querySelectorAll('[name="h1"]').forEach(cb => {
                        cb.checked = hobbiesArray.includes(cb.value);

                    });
                    // Set country
                    document.querySelector('[name="country"]').value = country;
                }
            // Reset Form Fields
                // function resetForm(){
                //     document.querySelector('[name = "n1"]').value = '';
                //     document.querySelector('[name = "q1"]').value = '';
                //     document.querySelector('[name = "h1"]').value = '';
                //     document.querySelector('[name = "c1"]').value = '';
                // }
            // Another way of Reset Form Fields
                function resetForm(){
                    document.getElementById('studentForm').reset();
                    editId = null;
                }
            
            //Delete student by ID
            function deleteStudent(id){
                if(confirm('Are you sure you want to delete this student?')){
                fetch(`deleteStudent/${id}`, {
                    method: 'DELETE'
                })
                .then(res => res.text())
                .then(msg => {
                    alert(msg);
                    loadStudents();
                })
                .catch(() => {
                    alert('Failed to delete student');
                });
            }
        }


            //load on page load
            loadStudents();
        </script>
    </body>
</html>
